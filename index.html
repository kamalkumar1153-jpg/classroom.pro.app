<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Classroom - Kamal Sir</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🌟 Live Classroom - Kamal Sir</h1>
      <p>Physics & Chemistry Live Classes</p>
    </header>

    <!-- YouTube Live Video -->
    <div class="video-container">
      <iframe id="videoPlayer" 
              width="100%" 
              height="100%" 
              src="" 
              title="YouTube video player" 
              frameborder="0" 
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
              allowfullscreen>
      </iframe>
    </div>

    <!-- AI Teacher -->
    <div class="section">
      <h2>🤖 AI Teacher से पूछें</h2>
      <input type="text" id="question" placeholder="सवाल लिखें... (जैसे: force, ohm, acid)">
      <button onclick="askAI()">जवाब पाएं</button>
      <p id="answer"></p>
    </div>

    <!-- Progress Tracker -->
    <div class="section">
      <h2>📊 आज कितना पढ़ाई किया?</h2>
      <input type="number" id="studyInput" placeholder="घंटे में (0-12)" min="0" max="12">
      <button onclick="updateProgress()">अपडेट करें</button>
      
      <div class="progress-bar">
        <div id="bar"></div>
      </div>
      <p id="percent">0% पूरा हुआ</p>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  
  <!-- Main Script -->
  <script src="script.js"></script>
</body>
</html>
