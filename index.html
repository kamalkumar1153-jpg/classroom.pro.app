<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Classroom PRO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">🎓 LIVE CLASSROOM PRO</div>

<!-- LIVE VIDEO -->
<div class="card">
<h3>📺 Live Class</h3>
<iframe id="videoPlayer" width="100%" height="220"
frameborder="0" allowfullscreen></iframe>
</div>

<!-- SUBJECT BUTTONS -->
<div class="card">
<button onclick="loadVideo('dQw4w9WgXcQ')">Physics</button>
<button onclick="loadVideo('3JZ_D3ELwOQ')">Chemistry</button>
<button onclick="loadVideo('ysz5S6PUM-U')">Maths</button>
</div>

<!-- AI TEACHER -->
<div class="card">
<h3>🤖 AI Teacher</h3>
<input id="question" placeholder="Ask question">
<button onclick="askAI()">Ask</button>
<p id="answer"></p>
</div>

<!-- PROGRESS -->
<div class="card">
<h3>📊 Study Progress</h3>
<input id="studyInput" placeholder="Hours">
<button onclick="updateProgress()">Update</button>

<div class="progress">
<div id="bar" class="progress-bar"></div>
</div>

<p id="percent"></p>
</div>

<!-- NOTIFICATION -->
<div class="card">
<button onclick="notifyUser()">🔔 Test Notification</button>
</div>

<script src="script.js"></script>
</body>
</html>
