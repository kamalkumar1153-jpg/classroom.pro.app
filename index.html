<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBSE 12th Study Vault</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="card video-section">
            <iframe id="videoPlayer" width="100%" height="215" 
                src="https://www.youtube.com/embed/r9n5Y9xH4mE" 
                frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen></iframe>
        </div>

        <div class="card button-group">
            <button class="btn" onclick="loadVideo('r9n5Y9xH4mE')">Physics</button>
            <button class="btn" onclick="loadVideo('yK6WnU4_Dk4')">Chemistry</button>
            <button class="btn" onclick="loadVideo('7pZ_OQf2C9c')">Maths</button>
        </div>

        <div class="card">
            <h3>🤖 AI Teacher</h3>
            <input id="question" type="text" placeholder="Physics/Chemistry सवाल पूछें...">
            <button class="btn" onclick="askAI()">Ask</button>
            <p id="answer" style="margin-top:10px; color:#ddd; font-weight:bold;"></p>
        </div>

        <div class="card">
            <h3>📊 Study Progress</h3>
            <input id="studyInput" type="number" placeholder="आज कितने घंटे पढ़े?">
            <button class="btn" onclick="updateProgress()">Update</button>
            <div class="progress-container" style="background:#444; height:15px; border-radius:10px; margin-top:10px;">
                <div id="bar" style="background:#4caf50; height:100%; width:0%; border-radius:10px; transition: 0.5s;"></div>
            </div>
            <p id="percent" style="margin-top:5px;">0% Done</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
