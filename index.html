<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12th Study Vault</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div class="container">
        <div class="card">
            <iframe id="videoPlayer" width="100%" height="200" 
                src="https://www.youtube.com/embed/3JZ_D3Elw" 
                frameborder="0" allowfullscreen>
            </iframe>
        </div>

        <div class="subject-buttons card">
            <button class="btn" onclick="loadVideo('3JZ_D3Elw')">Physics</button>
            <button class="btn" onclick="loadVideo('ysz5S6PUM')">Chemistry</button>
            <button class="btn" onclick="loadVideo('Maths_Video_ID')">Maths</button>
        </div>

        <div class="card">
            <h3>🤖 AI Teacher</h3>
            <input id="question" type="text" placeholder="Physics/Chemistry सवाल पूछें...">
            <button class="btn" onclick="askAI()">Ask</button>
            <p id="answer" style="margin-top:10px; color:#ddd;"></p>
        </div>

        <div class="card">
            <h3>📊 Study Progress</h3>
            <input id="studyInput" type="number" placeholder="आज कितने घंटे पढ़े?">
            <button class="btn" onclick="updateProgress()">Update</button>
            <div class="progress-container">
                <div id="bar" class="progress-bar"></div>
            </div>
            <p id="percent">0% Done</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
